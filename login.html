<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SomTechs SOC | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #020408; --surface: #0a0f1a; --border: #1a2540; --accent: #00ff88; --accent2: #00ccff; --text: #e0f0ff; --muted: #3a5070; --red: #ff3d57; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(0,255,136,0.03) 0%, transparent 60%), radial-gradient(ellipse at 80% 50%, rgba(0,204,255,0.03) 0%, transparent 60%); pointer-events: none; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; position: relative; z-index: 1; box-shadow: 0 0 60px rgba(0,255,136,0.05); }
  .login-card::before { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .logo { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); text-align: center; margin-bottom: 4px; }
  .subtitle { text-align: center; color: var(--muted); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input { width: 100%; background: rgba(0,255,136,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,255,136,0.08); }
  .login-btn { width: 100%; background: var(--accent); border: none; border-radius: 8px; padding: 13px; color: #000; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
  .login-btn:hover { background: #00ffaa; box-shadow: 0 0 20px rgba(0,255,136,0.3); }
  .error { background: rgba(255,61,87,0.1); border: 1px solid rgba(255,61,87,0.3); color: var(--red); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; text-align: center; }
  .version { text-align: center; color: var(--muted); font-size: 11px; margin-top: 24px; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">SomTechs</div>
  <div class="subtitle">Security Operations Center</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password">
    </div>
    <button type="submit" class="login-btn">Access SOC</button>
  </form>
  <div class="version">SomTechs MSP Platform v1.0</div>
</div>
</body>
</html>
