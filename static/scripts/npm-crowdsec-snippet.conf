# CrowdSec bouncer snippet for Nginx Proxy Manager
# Add this as a "Custom Nginx Configuration" on each proxy host in NPM
# Advanced tab → Custom Nginx Configuration

# How it works:
# Each request checks the client IP against the CrowdSec bouncer API
# Banned IPs get 403 before hitting your upstream

location / {
    # CrowdSec IP check
    access_by_lua_block {
        local http = require "resty.http"
        local httpc = http.new()
        httpc:set_timeout(500)
        local res, err = httpc:request_uri("http://crowdsec-bouncer:8080/api/v1/forwardAuth", {
            method = "GET",
            headers = {
                ["X-Forwarded-For"] = ngx.var.remote_addr,
                ["X-Real-IP"] = ngx.var.remote_addr,
            }
        })
        if err or not res then
            -- Bouncer unreachable — fail open (allow) to avoid blocking legit traffic
            ngx.log(ngx.WARN, "CrowdSec bouncer unreachable: ", err)
            return
        end
        if res.status == 403 then
            ngx.exit(ngx.HTTP_FORBIDDEN)
        end
    }
}
